<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #020c1b;
            color: #ccd6f6;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,255,0.015) 2px, rgba(0,255,255,0.015) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,255,255,0.015) 2px, rgba(0,255,255,0.015) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: 8px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff88;
            animation: flicker 4s infinite;
        }

        .logo span { color: #ff2d78; text-shadow: 0 0 20px #ff2d78; }

        .tagline {
            color: #64ffda;
            font-size: 13px;
            letter-spacing: 4px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0 40px;
            font-size: 11px;
            color: #8892b0;
            letter-spacing: 2px;
        }

        .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #64ffda;
            box-shadow: 0 0 8px #64ffda;
            animation: pulse 2s infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        .scan-box {
            background: rgba(2, 12, 27, 0.9);
            border: 1px solid #00ffff44;
            border-radius: 4px;
            padding: 36px;
            position: relative;
            margin-bottom: 30px;
        }

        .scan-box::before {
            content: 'SCAN TERMINAL';
            position: absolute;
            top: -11px; left: 20px;
            background: #020c1b;
            color: #00ffff;
            font-size: 11px;
            letter-spacing: 3px;
            padding: 0 10px;
        }

        .scan-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 40px; height: 40px;
            border-top: 2px solid #00ffff;
            border-left: 2px solid #00ffff;
        }

        .corner-br {
            position: absolute;
            bottom: 0; right: 0;
            width: 40px; height: 40px;
            border-bottom: 2px solid #00ffff;
            border-right: 2px solid #00ffff;
        }

        .input-label {
            font-size: 11px;
            color: #64ffda;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .url-input {
            flex: 1;
            background: rgba(100, 255, 218, 0.03);
            border: 1px solid #00ffff44;
            border-radius: 2px;
            color: #ccd6f6;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 14px 18px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .url-input::placeholder { color: #4a5568; }

        .url-input:focus {
            border-color: #00ffff88;
            box-shadow: 0 0 15px rgba(0,255,255,0.1);
        }

        .scan-btn {
            background: transparent;
            border: 1px solid #00ffff;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 3px;
            padding: 14px 28px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .scan-btn:hover {
            background: rgba(0,255,255,0.08);
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        .scan-btn:active { transform: scale(0.97); }

        .scan-btn.loading {
            color: #64ffda;
            border-color: #64ffda;
            pointer-events: none;
        }

        .result-box {
            background: rgba(2, 12, 27, 0.9);
            border-radius: 4px;
            padding: 30px;
            position: relative;
            display: none;
            animation: slideIn 0.4s ease;
        }

        .result-safe {
            border: 1px solid #64ffda66;
        }

        .result-safe::before {
            content: 'SCAN RESULT — CLEAN';
            position: absolute;
            top: -11px; left: 20px;
            background: #020c1b;
            color: #64ffda;
            font-size: 11px;
            letter-spacing: 3px;
            padding: 0 10px;
        }

        .result-danger {
            border: 1px solid #ff2d7866;
        }

        .result-danger::before {
            content: 'SCAN RESULT — THREAT DETECTED';
            position: absolute;
            top: -11px; left: 20px;
            background: #020c1b;
            color: #ff2d78;
            font-size: 11px;
            letter-spacing: 3px;
            padding: 0 10px;
        }

        .result-warning {
            border: 1px solid #f6c90e66;
        }

        .result-warning::before {
            content: 'SCAN RESULT — SUSPICIOUS';
            position: absolute;
            top: -11px; left: 20px;
            background: #020c1b;
            color: #f6c90e;
            font-size: 11px;
            letter-spacing: 3px;
            padding: 0 10px;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .result-icon {
            font-size: 36px;
        }

        .result-status {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 4px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .result-field {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 2px;
            padding: 14px;
        }

        .field-label {
            font-size: 10px;
            color: #8892b0;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .field-value {
            font-size: 16px;
            font-weight: bold;
            color: #ccd6f6;
        }

        .field-value.safe { color: #64ffda; }
        .field-value.danger { color: #ff2d78; }
        .field-value.warning { color: #f6c90e; }

        .ai-summary {
            background: rgba(100,255,218,0.03);
            border-left: 3px solid #64ffda;
            padding: 16px 20px;
            font-size: 13px;
            color: #a8b2d8;
            line-height: 1.7;
        }

        .ai-summary-label {
            font-size: 10px;
            color: #64ffda;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 3px;
            background: rgba(0,255,255,0.1);
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffff, #64ffda);
            animation: progressAnim 18s linear forwards;
        }

        .scan-log {
            font-size: 11px;
            color: #4a5568;
            margin-top: 12px;
            min-height: 18px;
            letter-spacing: 1px;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 11px;
            color: #2d3748;
            letter-spacing: 2px;
        }

        @keyframes flicker {
            0%,95%,100% { opacity: 1; }
            96% { opacity: 0.85; }
            97% { opacity: 1; }
            98% { opacity: 0.9; }
        }

        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes progressAnim {
            0%   { width: 0%; }
            30%  { width: 40%; }
            60%  { width: 65%; }
            85%  { width: 85%; }
            100% { width: 99%; }
        }

        @media (max-width: 600px) {
            .result-grid { grid-template-columns: 1fr; }
            .input-row { flex-direction: column; }
            .logo { font-size: 34px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="logo">PHISH<span>GUARD</span></div>
        <div class="tagline">AI-Powered Phishing Detection System</div>
        <div class="status-bar">
            <span><span class="status-dot"></span>SYSTEM ONLINE</span>
            <span><span class="status-dot"></span>AI ENGINE READY</span>
            <span><span class="status-dot"></span>VT API CONNECTED</span>
        </div>
    </div>

    <div class="scan-box">
        <div class="corner-br"></div>
        <div class="input-label">&gt; ENTER TARGET URL</div>
        <div class="input-row">
            <input type="text" class="url-input" id="urlInput"
                placeholder="https://example.com" 
                onkeydown="if(event.key==='Enter') scanUrl()">
            <button class="scan-btn" onclick="scanUrl()" id="scanBtn">SCAN</button>
        </div>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="scan-log" id="scanLog"></div>
    </div>

    <div class="result-box" id="resultBox">
        <div class="result-header">
            <div class="result-icon" id="resultIcon"></div>
            <div>
                <div style="font-size:11px;color:#8892b0;letter-spacing:3px;margin-bottom:4px">STATUS</div>
                <div class="result-status" id="resultStatus"></div>
            </div>
        </div>
        <div class="result-grid">
            <div class="result-field">
                <div class="field-label">SCANNED URL</div>
                <div class="field-value" id="resUrl" style="font-size:12px;word-break:break-all;"></div>
            </div>
            <div class="result-field">
                <div class="field-label">RISK LEVEL</div>
                <div class="field-value" id="resRisk"></div>
            </div>
            <div class="result-field">
                <div class="field-label">ENGINES FLAGGED</div>
                <div class="field-value" id="resEngines"></div>
            </div>
            <div class="result-field">
                <div class="field-label">THREAT CLASS</div>
                <div class="field-value" id="resThreat"></div>
            </div>
        </div>
        <div class="ai-summary">
            <div class="ai-summary-label">AI ANALYSIS</div>
            <div id="resSummary"></div>
        </div>
    </div>

    <div class="footer">PHISHGUARD v1.0 &mdash; SECURE SCAN ENGINE &mdash; DO NOT MISUSE</div>
</div>

<script>
    const logs = [
        'Initializing scan engine...',
        'Querying VirusTotal API...',
        'Running heuristic analysis...',
        'Checking domain reputation...',
        'Analyzing URL structure...',
        'Invoking AI threat model...',
        'Compiling threat report...'
    ];

    let logInterval;

    function startLogs() {
        let i = 0;
        document.getElementById('scanLog').textContent = logs[0];
        logInterval = setInterval(() => {
            i = (i + 1) % logs.length;
            document.getElementById('scanLog').textContent = logs[i];
        }, 2200);
    }

    function stopLogs() {
        clearInterval(logInterval);
        document.getElementById('scanLog').textContent = '';
    }

    async function scanUrl() {
        const url = document.getElementById('urlInput').value.trim();
        const btn = document.getElementById('scanBtn');
        const resultBox = document.getElementById('resultBox');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        if (!url) {
            document.getElementById('scanLog').textContent = 'ERROR: No URL provided.';
            return;
        }

        resultBox.style.display = 'none';
        btn.textContent = 'SCANNING...';
        btn.classList.add('loading');
        progressBar.style.display = 'block';
        progressFill.style.animation = 'none';
        void progressFill.offsetWidth;
        progressFill.style.animation = 'progressAnim 18s linear forwards';
        startLogs();

        try {
            const response = await fetch('/scan/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            const data = await response.json();
            renderResult(data);
        } catch (err) {
            renderError();
        } finally {
            btn.textContent = 'SCAN';
            btn.classList.remove('loading');
            progressBar.style.display = 'none';
            stopLogs();
        }
    }

    function renderResult(data) {
        const box = document.getElementById('resultBox');

        box.className = 'result-box';
        if (data.risk_level === 'High') {
            box.classList.add('result-danger');
            document.getElementById('resultIcon').textContent = '🚨';
            document.getElementById('resultStatus').style.color = '#ff2d78';
        } else if (data.risk_level === 'Medium') {
            box.classList.add('result-warning');
            document.getElementById('resultIcon').textContent = '⚠️';
            document.getElementById('resultStatus').style.color = '#f6c90e';
        } else {
            box.classList.add('result-safe');
            document.getElementById('resultIcon').textContent = '✅';
            document.getElementById('resultStatus').style.color = '#64ffda';
        }

        document.getElementById('resultStatus').textContent = data.status.toUpperCase();
        document.getElementById('resUrl').textContent = data.url;
        document.getElementById('resRisk').textContent = data.risk_level;
        document.getElementById('resRisk').className = 'field-value ' +
            (data.risk_level === 'High' ? 'danger' : data.risk_level === 'Medium' ? 'warning' : 'safe');
        document.getElementById('resEngines').textContent = data.engines_flagged + ' / ' + data.total_engines;
        document.getElementById('resThreat').textContent = data.status.toUpperCase();
        document.getElementById('resSummary').textContent = data.summary;

        box.style.display = 'block';
    }

    function renderError() {
        const box = document.getElementById('resultBox');
        box.className = 'result-box result-danger';
        document.getElementById('resultIcon').textContent = '🔴';
        document.getElementById('resultStatus').textContent = 'CONNECTION ERROR';
        document.getElementById('resultStatus').style.color = '#ff2d78';
        document.getElementById('resUrl').textContent = '—';
        document.getElementById('resRisk').textContent = '—';
        document.getElementById('resEngines').textContent = '—';
        document.getElementById('resThreat').textContent = '—';
        document.getElementById('resSummary').textContent = 'Backend unreachable. Make sure Flask server is running.';
        box.style.display = 'block';
    }
</script>

</body>
</html>
